<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xq0b's finds | Premium</title>
    <style>
        :root {
            --mulebuy-color: #8c7ae6;
            --kakobuy-color: #ff6b6b;
            --litbuy-color: #ff7f50;
            --oopbuy-color: #2e86de;
            --bg-main: #06080a;
            --card-bg: rgba(31, 40, 51, 0.6);
            --vault-bg: #151a22;
            --text-main: #94a3b8;
            --text-bright: #e2e8f0;
            --accent-glow: #45f3ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 50%, #16213e 0%, #06080a 100%);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
        }

        /* Scanline effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: -1;
        }

        .hub-heading {
            text-align: center;
            margin-bottom: 40px;
            color: var(--text-bright);
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(69, 243, 255, 0.2);
        }

        .category-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        
        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 26px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--text-bright);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .preview-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 12px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }

        .preview-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-glow);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .card-img-wrap { width: 100%; height: 240px; background: #0b0c10; border-radius: 12px; overflow: hidden; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .preview-card:hover .card-img-wrap img { transform: scale(1.05); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        
        .vault-container {
            background: rgba(21, 26, 34, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 580px; padding: 28px; border-radius: 28px;
        }

        .vault-agent-btn {
            display: block; text-align: center; padding: 12px; color: white;
            text-decoration: none; font-weight: bold; border-radius: 12px;
            margin-bottom: 8px; transition: 0.2s;
        }
        .vault-agent-btn:hover { filter: brightness(1.2); transform: scale(1.02); }
        
        .v-kakobuy { background-color: var(--kakobuy-color); }
        .v-mulebuy { background-color: var(--mulebuy-color); }
        .v-litbuy { background-color: var(--litbuy-color); }
        .v-oopbuy { background-color: var(--oopbuy-color); }
    </style>
</head>
<body>

    <h1 class="hub-heading">xq0b's finds</h1>
    
    <div class="category-nav">
        <button class="tab-btn active" onclick="switchCategory('IG-Brands', this)">IG Brands</button>
        <button class="tab-btn" onclick="switchCategory('accessories', this)">Accessories</button>
        <button class="tab-btn" onclick="switchCategory('hoodies', this)">Hoodies</button>
    </div>

    <div class="card-grid" id="cardGrid"></div>

    <div class="modal-overlay" id="vaultModal" onclick="closeVault(event)">
        <div class="vault-container" onclick="event.stopPropagation()">
            <h1 id="vTitle" style="color:white">Product</h1>
            <div id="vAgentStack"></div>
            <button onclick="closeVault(null)">Close</button>
        </div>
    </div>

<script>
    // Configuration
    const GITHUB_USER = "mryeet9043";
    const GITHUB_REPO = "Kakobuy-spreadsheet";
    let loadedItemsStorage = {};

    async function loadCategoryCards(path) {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '<div>Loading...</div>';
        
        try {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/cards/${path}`);
            const data = await resp.json();
            grid.innerHTML = '';
            
            for (const file of data.filter(f => f.name.endsWith('.json'))) {
                const res = await fetch(file.download_url);
                const item = await res.json();
                loadedItemsStorage[item.id] = item;
                
                grid.innerHTML += `
                    <div class="preview-card" onclick="openVaultModal('${item.id}')">
                        <div class="card-img-wrap"><img src="${item.img}"></div>
                        <div style="padding:15px"><h3>${item.title}</h3></div>
                    </div>
                `;
            }
        } catch (e) { grid.innerHTML = 'Error loading.'; }
    }

    function openVaultModal(id) {
        const item = loadedItemsStorage[id];
        document.getElementById('vTitle').innerText = item.title;
        document.getElementById('vAgentStack').innerHTML = `
            <a href="${item.links.kakobuy}" class="vault-agent-btn v-kakobuy">Kakobuy</a>
            <a href="${item.links.mulebuy}" class="vault-agent-btn v-mulebuy">Mulebuy</a>
        `;
        document.getElementById('vaultModal').style.display = 'flex';
    }

    function closeVault() { document.getElementById('vaultModal').style.display = 'none'; }
    
    window.onload = () => loadCategoryCards('IG-Brands/hoodies');
</script>
</body>
</html>
