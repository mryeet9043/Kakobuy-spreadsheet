<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xq0b's finds</title>
    <style>
        /* --- Boot Screen Styles --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; font-family: 'Courier New', Courier, monospace;
            padding: 25px; z-index: 9999; display: flex; flex-direction: column;
            justify-content: flex-start; overflow-y: auto; transition: opacity 0.8s ease;
        }
        #boot-text { white-space: pre-wrap; font-size: 13px; line-height: 1.4; padding-bottom: 20px; }

        :root {
            --mulebuy-color: #8c7ae6;
            --kakobuy-color: #ff6b6b;
            --litbuy-color: #ff7f50;
            --oopbuy-color: #2e86de;
            --bg-main: #000;
            --card-bg: #111;
            --text-main: #888;
            --text-bright: #fff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
        }
        
        .hub-heading {
            text-align: center;
            margin-bottom: 40px;
            color: var(--text-bright);
            font-size: 38px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* --- Navigation Styles --- */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #000;
            border: 1px solid #333;
            color: var(--text-main);
            padding: 12px 26px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tab-btn:hover {
            color: var(--text-bright);
            border-color: var(--text-bright);
            transform: scale(1.1); 
        }
        .tab-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* --- Sub-Category Menu --- */
        .sub-nav {
            display: none;
            justify-content: center;
            gap: 12px;
            margin-bottom: 45px;
            flex-wrap: wrap;
        }
        .sub-tab-btn {
            background: #111;
            border: 1px solid #333;
            color: var(--text-main);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sub-tab-btn:hover {
            color: var(--text-bright);
            border-color: var(--text-bright);
            transform: scale(1.1);
        }
        .sub-tab-btn.active {
            border-color: #fff;
            color: #fff;
        }

        /* --- Card Grid --- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .preview-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid #222;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .preview-card:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: #555;
        }
        .card-img-wrap { width: 100%; height: 240px; background: #000; overflow: hidden; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 22px 18px; }
        .card-title { font-size: 15px; font-weight: 600; margin: 0 0 12px 0; color: var(--text-bright); }
        .card-tag { font-size: 11px; text-transform: uppercase; color: #444; }

        /* --- Modal Styles --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .vault-container {
            background-color: #0d0d0d; border: 1px solid #333; width: 580px; height: 520px;
            border-radius: 28px; padding: 28px;
        }
        .vault-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .vault-title { font-size: 20px; color: #fff; }
        .btn-close-vault { background: #111; border: 1px solid #333; color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .vault-split-view { display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
        .vault-main-img { width: 100%; height: 240px; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid #333; }
        .vault-main-img img { width: 100%; height: 100%; object-fit: cover; }
        .agent-buttons-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .vault-agent-btn { display: block; text-align: center; padding: 10px; color: white; text-decoration: none; font-weight: bold; border-radius: 12px; font-size: 13px; }
        
        .v-kakobuy { background-color: var(--kakobuy-color); }
        .v-mulebuy { background-color: var(--mulebuy-color); }
        .v-litbuy { background-color: var(--litbuy-color); }
        .v-oopbuy { background-color: var(--oopbuy-color); }

        .vault-pricing-box { background: #111; border: 1px solid #333; border-radius: 18px; padding: 20px; }
        .vault-price-badge { color: #fff; font-size: 26px; font-weight: 800; }
        .vault-currency-conversions { font-size: 13px; color: #666; text-align: right; }
        /* Forced single line for error message */
        .no-cards-msg { text-align: center; color: #444; padding: 60px; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="boot-screen"><div id="boot-text"></div></div>

    <h1 class="hub-heading">xq0b's finds</h1>
    
    <div class="category-nav">
        <button class="tab-btn active" id="igBrandsTab" onclick="switchCategory('IG-Brands', this)">IG Brands</button>
        <button class="tab-btn" onclick="switchCategory('accessories', this)">Accessories</button>
        <button class="tab-btn" onclick="switchCategory('hoodies', this)">Hoodies</button>
        <button class="tab-btn" onclick="switchCategory('jeans', this)">Jeans</button>
        <button class="tab-btn" onclick="switchCategory('shoes', this)">Shoes</button>
        <button class="tab-btn" onclick="switchCategory('T-shirts', this)">T-Shirts</button>
    </div>

    <div class="sub-nav" id="igSubNav" style="display: flex;">
        <button class="sub-tab-btn active" onclick="switchSubCategory('hoodies', this)">Hoodies</button>
        <button class="sub-tab-btn" onclick="switchSubCategory('jeans', this)">Jeans</button>
        <button class="sub-tab-btn" onclick="switchSubCategory('sweatpants', this)">Sweatpants</button>
        <button class="sub-tab-btn" onclick="switchSubCategory('T-shirts', this)">T-Shirts</button>
    </div>
    
    <div class="card-grid" id="cardGrid">
        <div class="no-cards-msg" id="loadingMsg">Loading configuration folders...</div>
    </div>

    <div class="modal-overlay" id="vaultModal" onclick="closeVault(event)">
        <div class="vault-container" onclick="event.stopPropagation()">
            <div class="vault-header">
                <h1 class="vault-title" id="vTitle">Product Title</h1>
                <button class="btn-close-vault" onclick="closeVault(null)">Close</button>
            </div>
            <div class="vault-split-view">
                <div class="vault-left-col">
                    <div class="vault-main-img"><img id="vImg" src="" alt="Main Preview"></div>
                    <div class="agent-buttons-stack" id="vAgentStack"></div>
                </div>
                <div class="vault-right-col">
                    <div class="vault-pricing-box">
                        <span class="vault-price-badge" id="vPriceUsd">$0.00</span>
                        <div class="vault-currency-conversions" id="vPriceConversions"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
let loadedItemsStorage = {};
const EXCHANGE_RATES = { CNY: 7.24, EUR: 0.92, GBP: 0.78 };
const GITHUB_USER = "mryeet9043";
const GITHUB_REPO = "Kakobuy-spreadsheet";
let currentMainCategory = "IG-Brands";
let currentSubCategory = "hoodies";

async function runBootSequence() {
    const bootText = document.getElementById('boot-text');
    const bootScreen = document.getElementById('boot-screen');
    const lines = [
        "Initializing core system...", "Connecting to remote repository...",
        "Authenticating API endpoints...", "Establishing secure tunnel [Gateway-01]...",
        "Syncing distributed database...", "Verifying integrity of assets...",
        "Loading UI modules...", "Parsing configuration schemas...",
        "Building virtual DOM...", "Cache warmup in progress...",
        "Loading font assets...", "Optimizing rendering pipeline...",
        "Accessing Xq0b-vault...", "Permissions granted.",
        "------------------------------------",
        "System status: Online", "Latency: 12ms",
        "Data fetching: Ready", "Initiating sequence...", "Boot complete."
    ];
    for (const line of lines) {
        bootText.innerText += "> " + line + "\n";
        bootScreen.scrollTop = bootScreen.scrollHeight;
        await new Promise(r => setTimeout(r, 80));
    }
    await new Promise(r => setTimeout(r, 400));
    bootScreen.style.opacity = '0';
    setTimeout(() => { bootScreen.style.display = 'none'; }, 800);
}

async function findActualGitHubPath(targetPath) {
    const parts = targetPath.split('/');
    let currentPath = 'cards';
    for (const part of parts) {
        const resp = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${currentPath}`);
        if (!resp.ok) return null;
        const items = await resp.json();
        const matchedItem = items.find(i => i.name.toLowerCase() === part.toLowerCase());
        if (!matchedItem) return null;
        currentPath = currentPath + '/' + matchedItem.name;
    }
    return currentPath;
}

async function loadCategoryCards(relativePath) {
    const gridContainer = document.getElementById('cardGrid');
    gridContainer.innerHTML = `<div class="no-cards-msg">Site has been refreshed too many times (items list cannot update fast enough) try again later</div>`;
    try {
        const actualFolderDirectory = await findActualGitHubPath(relativePath);
        if (!actualFolderDirectory) return;
        const apiResponse = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${actualFolderDirectory}`);
        const filesList = await apiResponse.json();
        const jsonFiles = filesList.filter(file => file.name.toLowerCase().endsWith('.json'));
        gridContainer.innerHTML = '';
        for (const file of jsonFiles) {
            const itemData = await (await fetch(file.download_url)).json();
            loadedItemsStorage[itemData.id] = itemData;
            gridContainer.insertAdjacentHTML('beforeend', `
                <div class="preview-card" onclick="openVaultModal('${itemData.id}')">
                    <div class="card-img-wrap"><img src="${itemData.img}" alt="Product"></div>
                    <div class="card-content">
                        <div class="card-title">${itemData.title}</div>
                        <div class="card-tag">${relativePath}</div>
                    </div>
                </div>
            `);
        }
    } catch (e) { console.error(e); }
}

function switchCategory(categoryName, element) {
    currentMainCategory = categoryName;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    const subNav = document.getElementById('igSubNav');
    if (categoryName.toLowerCase() === 'ig-brands') {
        subNav.style.display = 'flex';
        loadCategoryCards(`IG-Brands/${currentSubCategory}`);
    } else {
        subNav.style.display = 'none';
        loadCategoryCards(categoryName);
    }
}

function switchSubCategory(subCategoryName, element) {
    currentSubCategory = subCategoryName;
    document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    loadCategoryCards(`IG-Brands/${subCategoryName}`);
}

function openVaultModal(cardId) {
    const itemData = loadedItemsStorage[cardId];
    document.getElementById('vTitle').innerText = itemData.title;
    document.getElementById('vImg').src = itemData.img;
    document.getElementById('vPriceUsd').innerText = `≈ $${itemData.price.toFixed(2)}`;
    document.getElementById('vPriceConversions').innerHTML = `¥ ${(itemData.price * EXCHANGE_RATES.CNY).toFixed(2)}<br>€ ${(itemData.price * EXCHANGE_RATES.EUR).toFixed(2)}<br>£ ${(itemData.price * EXCHANGE_RATES.GBP).toFixed(2)}`;
    document.getElementById('vAgentStack').innerHTML = `
        <a href="${itemData.links.kakobuy}" class="vault-agent-btn v-kakobuy">Open in Kakobuy</a>
        <a href="${itemData.links.mulebuy}" class="vault-agent-btn v-mulebuy">Open in Mulebuy</a>
        <a href="${itemData.links.litbuy}" class="vault-agent-btn v-litbuy">Open in Litbuy</a>
        <a href="${itemData.links.oopbuy}" class="vault-agent-btn v-oopbuy">Open in Oopbuy</a>
    `;
    document.getElementById('vaultModal').style.display = 'flex';
}

function closeVault(event) {
    if (event === null || event.target === document.getElementById('vaultModal')) {
        document.getElementById('vaultModal').style.display = 'none';
    }
}

window.onload = async () => { await runBootSequence(); loadCategoryCards("IG-Brands/hoodies"); };
</script>
</body>
</html>
